name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --locked --extra app --extra test-pdf

      - name: Check manifest freshness
        run: uv run python scripts/check_manifest_freshness.py --manifest datasets/paper/public_sources_manifest.csv --text-dir datasets/paper/text

      - name: Run tests
        run: uv run pytest

      - name: Check Make targets
        run: |
          make -n test
          make -n smoke-extract
          make -n eval
          make -n paper-table
